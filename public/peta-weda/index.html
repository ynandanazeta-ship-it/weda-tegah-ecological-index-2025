        html, body, #map {
            width: 100%;

            margin: 0;
        }
        </style>
        <title></title>
    </head>
    <body>
        <div id="map">
            <div id="popup" class="ol-popup">
                <a href="#" id="popup-closer" class="ol-popup-closer"></a>
                <div id="popup-content"></div>
            </div>
        </div>
        <script src="resources/qgis2web_expressions.js"></script>
        <script src="./resources/functions.js"></script>
        <script src="./resources/ol.js"></script>
        <script src="./resources/ol-layerswitcher.js"></script>
        <script src="resources/photon-geocoder-autocomplete.min.js"></script>
        <script src="resources/olms.js"></script>
        <script src="layers/Kec_Weda_Tengah_2.js"></script>
        <script src="styles/Kec_Weda_Tengah_2_style.js"></script>
        <script src="./layers/layers.js" type="text/javascript"></script> 
        <script src="./resources/Autolinker.min.js"></script>
        <script src="./resources/qgis2web.js"></script>        
    
        <script>
     // Variabel global untuk mengunci data asli peta agar tidak hilang saat di-filter
var rseiOriginalFeatures = null;

window.addEventListener('message', function(event) {
    // Memastikan pesan yang masuk adalah filter RSEI dari Next.js
    if (event.data && event.data.type === 'FILTER_RSEI_LEVEL') {
        var activeLevels = event.data.levels;
        var rseiLayer = null;

        // 1. CARI LAYER SECARA OTOMATIS BERDASARKAN ATRIBUT 'DN'
        if (typeof map !== 'undefined') {
            map.getLayers().forEach(function(layer) {
                if (layer.getSource && typeof layer.getSource === 'function') {
                    var src = layer.getSource();
                    if (src && src.getFeatures && src.getFeatures().length > 0) {
                        var firstFeat = src.getFeatures()[0];
                        // Jika layer ini memiliki kolom DN atau dn, berarti ini layer RSEI kita
                        if (firstFeat.getProperties()['DN'] !== undefined || firstFeat.getProperties()['dn'] !== undefined) {
                            rseiLayer = layer;
                        }
                    }
                }
            });
        }

        // Jika layer belum termuat sempurna di browser, hentikan proses sejenak
        if (!rseiLayer) return; 

        var source = rseiLayer.getSource();

        // 2. BACKUP DATA ASLI (Hanya dilakukan sekali di awal klik)
        if (!rseiOriginalFeatures || rseiOriginalFeatures.length === 0) {
            rseiOriginalFeatures = source.getFeatures().slice();
        }

        if (!rseiOriginalFeatures || rseiOriginalFeatures.length === 0) return;

        // 3. PROSES PENYARINGAN (FILTERING)
        var filteredFeatures = rseiOriginalFeatures.filter(function(feature) {
            var props = feature.getProperties();
            var dnValue = props['DN'] !== undefined ? props['DN'] : props['dn'];
            
            if (dnValue === undefined || dnValue === null) return true;
            var dn = parseInt(dnValue);
            
            // Mencocokkan angka DN (1-5) dengan status tombol True/False dari dashboard
            if (dn === 5) return activeLevels.excellent;
            if (dn === 4) return activeLevels.good;
            if (dn === 3) return activeLevels.moderate;
            if (dn === 2) return activeLevels.poor;
            if (dn === 1) return activeLevels.bad;
            
            return true;
        });

        // 4. BERSIHKAN PETA DAN MASUKKAN DATA YANG LOLOS FILTER saja
        source.clear();
        source.addFeatures(filteredFeatures);
        
        // 5. PAKSA PETA UNTUK MENGGAMBAR ULANG
        if (typeof map !== 'undefined') {
            map.render();
        }
    }
});
</script>
    </body>
</html>
